name: Feature request
description: Something you'd like scry to do.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: What are you trying to accomplish that scry makes hard today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behaviour
      description: How you'd like scry to behave. Include example commands.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: scope
    attributes:
      label: Rough scope
      options:
        - Flag / CLI tweak
        - Output format
        - New Lua API
        - New bundled script
        - New protocol / scan mode
        - Docs
        - Other
    validations:
      required: true
  - type: checkboxes
    id: check
    attributes:
      label: Confirmations
      options:
        - label: I checked DEFERRED.md and scry-plan.md §10 for existing decisions.
          required: true
