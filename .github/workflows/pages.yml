name: Pages

# Publishes docs/site/ to the gh-pages branch. GitHub Pages then serves
# it when the repo has Settings → Pages → Source = "Deploy from a branch"
# → Branch: gh-pages / (root).
#
# Branch-based publishing is intentional here instead of the
# actions/deploy-pages route because the latter registers a
# `github-pages` environment that shows up in the repo's Deployments
# panel. The user wants Deployments reserved for release builds, so
# docs publishing stays off that sidebar.

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Jekyll site
        uses: actions/jekyll-build-pages@v1
        with:
          source: docs/site
          destination: _site

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: 'docs: deploy ${{ github.sha }}'
