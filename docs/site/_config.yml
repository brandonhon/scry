title: scry
description: Fast IP/port scanner — Go, single static binary, Linux + Windows + macOS.
remote_theme: pages-themes/cayman@v0.2.0
plugins:
  - jekyll-remote-theme
  - jekyll-sitemap
  - jekyll-seo-tag

# Repo root pages shouldn't be swept in as site content; Jekyll only
# builds docs/site/ because that's where this config lives.
exclude:
  - data/
  - bin/
  - scripts/build.ps1

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

defaults:
  - scope:
      path: ""
    values:
      layout: default
